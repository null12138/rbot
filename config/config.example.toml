[telegram]
token = "PUT_TELEGRAM_BOT_TOKEN_HERE"
admin_user_ids = [123456789]

[llm]
base_url = "https://api.openai.com"
api_key = "PUT_API_KEY_HERE"
model = "gpt-4o-mini"
embed_model = "text-embedding-3-small"
request_timeout_secs = 60

[memory]
db_path = "data/agent.db"
base_dir = "memory"
short_term_limit = 16
sleep_time = "02:30"
timezone = "Asia/Shanghai"

[tools.shell]
allow_all = false
allow_meta = false
use_shell = false
allowlist = ["ls", "rg", "git", "cargo", "cat", "pwd", "whoami"]

[tools.tmux]
allow_all = false
allowlist = ["new-session", "list-sessions", "kill-session", "capture-pane", "send-keys"]

[tools.http]
allow_all = false
allowed_domains = ["api.github.com", "api.openai.com"]

[security]
# regex patterns; if matched, block execution
# keep minimal and extend as needed
danger_patterns = [
  "rm\\s+-rf",
  "mkfs",
  "dd\\s+if=",
  ":\\(\\)\\{\\s*:\\|:\\s*&\\};:",
  "shutdown",
  "reboot"
]

[scheduler]
heartbeat_interval_secs = 60

[skills]
dir = "skills"

[network]
# Optional proxy for Telegram/LLM/HTTP tools, e.g. "http://127.0.0.1:7890"
proxy_url = ""
