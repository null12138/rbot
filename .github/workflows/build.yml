name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          rustflags: ""

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -czf "dist/rbot-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" rbot

      - name: Prepare artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rbot.exe" "dist/rbot-${{ matrix.target }}.exe"
          Compress-Archive -Path "dist/rbot-${{ matrix.target }}.exe" -DestinationPath "dist/rbot-${{ matrix.target }}.zip" -Force
          Remove-Item "dist/rbot-${{ matrix.target }}.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbot-${{ matrix.target }}
          path: dist/*

  release:
    name: Release (tag)
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rbot-*
          path: dist
          merge-multiple: true

      - name: Add installer scripts
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/update.sh dist/update.sh
          cp scripts/uninstall.sh dist/uninstall.sh
          cp scripts/install.ps1 dist/install.ps1
          cp scripts/update.ps1 dist/update.ps1
          cp scripts/uninstall.ps1 dist/uninstall.ps1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  release_main:
    name: Release (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rbot-*
          path: dist
          merge-multiple: true

      - name: Add installer scripts
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/update.sh dist/update.sh
          cp scripts/uninstall.sh dist/uninstall.sh
          cp scripts/install.ps1 dist/install.ps1
          cp scripts/update.ps1 dist/update.ps1
          cp scripts/uninstall.ps1 dist/uninstall.ps1

      - name: Publish GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          target_commitish: ${{ github.sha }}
          prerelease: true
          files: dist/*
